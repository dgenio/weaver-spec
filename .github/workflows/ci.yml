name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate schemas are valid JSON
        run: |
          python -c "
          import json, glob, sys
          files = glob.glob('contracts/json/*.schema.json')
          if not files:
              print('ERROR: No schema files found', file=sys.stderr)
              sys.exit(1)
          for f in sorted(files):
              with open(f) as fh:
                  data = json.load(fh)
              for field in ['\$id', 'title', 'description']:
                  if field not in data:
                      print(f'ERROR: {f} missing {field}', file=sys.stderr)
                      sys.exit(1)
              print(f'OK: {f}')
          print(f'Validated {len(files)} schema(s)')
          "

      - name: Validate sample payloads are valid JSON
        run: |
          python -c "
          import json, glob, sys
          files = glob.glob('examples/sample_payloads/*.json')
          if not files:
              print('ERROR: No sample payload files found', file=sys.stderr)
              sys.exit(1)
          for f in sorted(files):
              with open(f) as fh:
                  json.load(fh)
              print(f'OK: {f}')
          print(f'Validated {len(files)} payload(s)')
          "

  python-tests:
    name: Python Package Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        working-directory: contracts/python
        run: pip install -e ".[dev]"

      - name: Run type checks
        working-directory: contracts/python
        run: mypy src/

      - name: Run tests with coverage
        working-directory: contracts/python
        run: pytest --cov --cov-report=term-missing -v

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          markdownlint \
            --disable MD013 MD033 MD041 \
            README.md CONTRIBUTING.md CHANGELOG.md \
            docs/*.md \
            contracts/**/*.md \
            examples/*.md
